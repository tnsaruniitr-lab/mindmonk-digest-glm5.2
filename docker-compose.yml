# Local development environment.
# Usage: docker compose up -d postgres
# Then run the app locally pointing at localhost:5432.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mindmonk
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: mindmonk_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmonk"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
