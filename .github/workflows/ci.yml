# Phase 0/1 CI: lint → typecheck → test on every push and PR.
# Uses a Postgres service container for the multi-tenant migration + integration tests.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mindmonk
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: mindmonk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mindmonk"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://mindmonk:dev@localhost:5432/mindmonk_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/ config/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ config/ tests/

      - name: Type check (mypy)
        run: mypy src/ config/

      - name: Migration smoke (alembic builds schema from scratch on Postgres)
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          TELEGRAM_CHAT_ID: "999999"
        run: |
          alembic upgrade head
          python -c "import psycopg; c=psycopg.connect('$DATABASE_URL'); cur=c.cursor(); cur.execute(\"SELECT count(*) FROM information_schema.tables WHERE table_schema='public'\"); print('tables:', cur.fetchone()[0])"

      - name: Test (pytest — unit + multi-tenant integration)
        run: pytest tests/ -v
