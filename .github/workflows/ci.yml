# Phase 0 CI: lint → typecheck → test on every push and PR.
# Fast feedback; fails the build on any red step.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/ config/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ config/ tests/

      - name: Type check (mypy)
        run: mypy src/ config/

      - name: Test (pytest, SQLite — no external services)
        run: pytest tests/ -v

      - name: Migration smoke (alembic builds schema from scratch)
        env:
          DATABASE_URL: "sqlite:///ci-test.db"
        run: |
          alembic upgrade head
          python -c "import sqlite3; c=sqlite3.connect('ci-test.db'); print('tables:', [r[0] for r in c.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall()])"
